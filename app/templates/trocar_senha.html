{% extends "base.html" %}
{% block title %}Trocar senha — Avaliador{% endblock %}
{% block content %}
<h1 class="text-2xl font-bold text-blue-900 mb-4">Trocar senha</h1>
<div class="bg-white rounded-lg shadow p-6 max-w-md">
  <form method="post" action="/trocar-senha" class="space-y-4">
    <input type="hidden" name="csrf_token" value="{{ csrf }}">
    <div><label class="block text-sm font-semibold mb-1">Senha atual</label>
      <input type="password" name="atual" required autofocus autocomplete="current-password" class="w-full px-3 py-2 border rounded">
    </div>
    <div><label class="block text-sm font-semibold mb-1">Nova senha (mín. 8)</label>
      <input type="password" name="nova" required minlength="8" autocomplete="new-password" class="w-full px-3 py-2 border rounded">
    </div>
    <div><label class="block text-sm font-semibold mb-1">Confirme a nova senha</label>
      <input type="password" name="confirma" required minlength="8" autocomplete="new-password" class="w-full px-3 py-2 border rounded">
    </div>
    <button class="bg-blue-900 hover:bg-blue-800 text-white px-4 py-2 rounded font-semibold">Trocar senha</button>
    <a href="/" class="ml-2 text-gray-600 hover:underline">Cancelar</a>
  </form>
</div>
{% endblock %}
