{% extends "base.html" %}
{% block title %}Entrar — Avaliador Farol Público{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center px-4">
  <div class="bg-white shadow-lg rounded-xl p-8 w-full max-w-md border border-gray-200">
    <h1 class="text-2xl font-bold text-blue-900 text-center">⚙️ Avaliador</h1>
    <p class="text-center text-gray-500 text-sm mt-1">Farol Público · Sistema de avaliação ITGP</p>
    <form method="post" action="/login" class="mt-6 space-y-4">
      <div>
        <label class="block text-sm font-semibold mb-1">Usuário</label>
        <input type="text" name="usuario" required autofocus
               class="w-full px-3 py-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-400 focus:outline-none">
      </div>
      <div>
        <label class="block text-sm font-semibold mb-1">Senha</label>
        <input type="password" name="senha" required
               class="w-full px-3 py-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-400 focus:outline-none">
      </div>
      <button type="submit" class="w-full bg-blue-900 hover:bg-blue-800 text-white py-2 rounded font-semibold">Entrar</button>
    </form>
  </div>
</div>
{% endblock %}
